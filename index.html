<style>

    --gold-light: #e8c97a;
    --gold-dark: #8b6914;
    --cream: #fdf6e3;
    --brown: #3d2b1f;
    --brown-light: #6b4c36;
    --green: #2d5a3d;
    --green-light: #4a8c65;
    --shadow: rgba(61,43,31,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(135deg, var(--brown) 0%, var(--green) 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,.35);
  }

  header h1 {
    font-family: 'Amiri', serif;
    font-size: 1.4rem;
    color: var(--gold-light);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toolbar { display: flex; align-items: center; gap: 8px; }

  .btn-icon {
    width: 36px; height: 36px;
    background: rgba(255,255,255,.12);
    color: #fff;
    border-radius: 8px;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,.15);
    cursor: pointer;
    transition: all .2s;
  }
  .btn-icon:hover { background: rgba(255,255,255,.25); transform: scale(1.07); }

  .zoom-display {
    color: var(--gold-light);
    font-size: .82rem;
    min-width: 42px;
    text-align: center;
    font-weight: 600;
  }

  .btn-primary {
    padding: 0 14px;
    height: 36px;
    background: var(--gold);
    color: var(--brown);
    font-weight: 700;
    font-family: 'Tajawal', sans-serif;
    font-size: .85rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(201,168,76,.4);
    transition: all .2s;
  }
  .btn-primary:hover { background: var(--gold-light); transform: scale(1.04); }

  #canvas-wrap {
    position: fixed;
    top: 60px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 30% 30%, rgba(45,90,61,.07) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 70%, rgba(201,168,76,.06) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23c9a84c' stroke-opacity='.07' stroke-width='.5'%3E%3Cpath d='M0 0h40v40H0z'/%3E%3C/g%3E%3C/svg%3E"),
      var(--cream);
    cursor: grab;
  }
  #canvas-wrap.dragging { cursor: grabbing; }

  #tree-canvas {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
  }

  #svg-lines {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }

  /* NODE */
  .node {
    position: absolute;
    width: 150px;
    cursor: pointer;
    z-index: 2;
  }

  .node-card {
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 18px var(--shadow), 0 1px 0 rgba(255,255,255,.7) inset;
    transition: transform .18s, box-shadow .18s;
  }
  .node:hover .node-card {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 12px 36px var(--shadow);
  }

  .node-header { height: 8px; width: 100%; }

  .node-body {
    padding: 10px 10px 12px;
    background: #fff;
    border: 1px solid rgba(201,168,76,.2);
    border-top: none;
    border-radius: 0 0 14px 14px;
  }

  .node-name {
    font-family: 'Amiri', serif;
    font-size: .97rem;
    font-weight: 700;
    color: var(--brown);
    text-align: center;
    line-height: 1.35;
  }

  .node-hint {
    font-size: .68rem;
    color: #bbb;
    text-align: center;
    margin-top: 4px;
  }

  /* + button below node */
  .add-child-btn {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    width: 22px; height: 22px;
    background: var(--green);
    color: #fff;
    border-radius: 50%;
    font-size: 1rem;
    line-height: 22px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    transition: transform .18s, opacity .18s;
    z-index: 5;
    pointer-events: none;
  }
  .node:hover .add-child-btn {
    transform: translateX(-50%) scale(1.1);
    pointer-events: auto;
  }

  /* generation colours */
  .gen-0 .node-header { background: linear-gradient(90deg, var(--gold-dark), var(--gold)); }
  .gen-1 .node-header { background: linear-gradient(90deg, var(--green), var(--green-light)); }
  .gen-2 .node-header { background: linear-gradient(90deg, var(--brown-light), #a06040); }
  .gen-3 .node-header { background: linear-gradient(90deg, #4a6fa5, #6b9bd2); }
  .gen-4 .node-header { background: linear-gradient(90deg, #7b4f9e, #a87cc9); }

  /* LINES */
  .tree-line {
    stroke: var(--gold);
    stroke-width: 1.8;
    fill: none;
    opacity: .42;
    stroke-dasharray: 5 3;
    animation: dash 18s linear infinite;
  }
  @keyframes dash { to { stroke-dashoffset: -200; } }

  /* CONTEXT MENU */
  #ctx-menu {
    position: fixed;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    border: 1.5px solid rgba(201,168,76,.25);
    z-index: 400;
    min-width: 170px;
    overflow: hidden;
    display: none;
  }
  #ctx-menu.open { display: block; animation: popIn .15s cubic-bezier(.34,1.56,.64,1); }

  .ctx-item {
    padding: 11px 18px;
    font-size: .88rem;
    cursor: pointer;
    color: var(--brown);
    display: flex; align-items: center; gap: 10px;
    transition: background .15s;
    font-family: 'Tajawal', sans-serif;
  }
  .ctx-item:hover { background: var(--cream); }
  .ctx-item.danger { color: #c0392b; }
  .ctx-item.danger:hover { background: #fff5f5; }
  .ctx-divider { height: 1px; background: #f0ece6; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(30,20,10,.5);
    backdrop-filter: blur(4px);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 26px 28px 24px;
    width: min(340px, 94vw);
    box-shadow: 0 24px 80px rgba(0,0,0,.25);
    animation: popIn .22s cubic-bezier(.34,1.56,.64,1);
    position: relative;
    border-top: 5px solid var(--gold);

    font-family: 'Amiri', serif;
    color: var(--brown);
    font-size: 1.25rem;
    margin-bottom: 6px;
    text-align: center;

    color: #aaa;
    text-align: center;
    margin-bottom: 16px;

    border-radius: 10px;
    font-size: .9rem;
    font-weight: 700;
    font-family: 'Tajawal', sans-serif;
    border: none;
    cursor: pointer;
    transition: .2s;

  .btn-cancel {
    padding: 10px 18px;
    background: #f0ece6;
    color: #888;
    border-radius: 10px;
    font-size: .9rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 600;
    border: none;
    cursor: pointer;
  }
  .btn-cancel:hover { background: #e8e2da; }

  .close-btn {
    position: absolute;
    top: 12px; left: 12px;
    width: 28px; height: 28px;
    background: #f0ece6;
    border: none; border-radius: 50%;
    cursor: pointer; font-size: .9rem; color: #888;
    display: flex; align-items: center; justify-content: center;

  .close-btn:hover { background: #e0dbd2; color: var(--brown); }

    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: rgba(61,43,31,.82);
    color: var(--gold-light);
    padding: 8px 20px;
    border-radius: 20px;
    font-size: .78rem;
    pointer-events: none;
    transition: opacity 1s;
    white-space: nowrap;
  }

  /* PRINT */
  @media print {
    header, #tip, #ctx-menu { display: none !important; }
    body { overflow: visible !important; background: #fff !important; }
    #canvas-wrap { position: static !important; width: 100% !important; height: auto !important; overflow: visible !important; }
    #tree-canvas { position: static !important; transform: none !important; }
  }
</style>
</head>

/* ══════════ LAYOUT ══════════ */
const NW = 150, NH = 54, HGAP = 42, VGAP = 90, PAD = 60;

function buildPositions() {
  const ids = new Set(nodes.map(n => n.id));
  const roots = nodes.filter(n => !n.parent || !ids.has(n.parent));
  const positions = {};
  let leafIndex = 0;

  function assign(id, depth) {
    const kids = nodes.filter(c => c.parent === id);
    if (!kids.length) {
      positions[id] = { x: leafIndex * (NW + HGAP), y: depth * (NH + VGAP) };
      leafIndex++;
    } else {
      kids.forEach(c => assign(c.id, depth + 1));
      const firstX = positions[kids[0].id].x;
      const lastX  = positions[kids[kids.length - 1].id].x;
      positions[id] = { x: (firstX + lastX) / 2, y: depth * (NH + VGAP) };
    }
  }

  roots.forEach(r => assign(r.id, 0));
  return positions;
}

function getGen(id) {
  let g = 0, cur = nodes.find(n => n.id === id);
  const ids = new Set(nodes.map(n => n.id));
  while (cur && cur.parent && ids.has(cur.parent)) {
    g++;
    cur = nodes.find(n => n.id === cur.parent);
    if (!cur) break;
  }
  return g;
}

function render() {
  const wrap2 = document.getElementById('tree-canvas');
  const svg = document.getElementById('svg-lines');
  const pos = buildPositions();

  Array.from(wrap2.children).forEach(el => { if (el !== svg) el.remove(); });
  svg.innerHTML = '';

  const xs = Object.values(pos).map(p => p.x);
  const ys = Object.values(pos).map(p => p.y);
  if (!xs.length) return;

  const W = Math.max(...xs) + NW + PAD * 2;
  const H = Math.max(...ys) + NH + PAD * 2;
  wrap2.style.width = W + 'px'; wrap2.style.height = H + 'px';
  svg.setAttribute('width', W); svg.setAttribute('height', H);

  nodes.forEach(node => {
    const p = pos[node.id]; if (!p) return;
    const px = p.x + PAD, py = p.y + PAD;

    // connector
    if (node.parent) {
      const pp = pos[node.parent];
      if (pp) {
        const x1 = pp.x + PAD + NW / 2, y1 = pp.y + PAD + NH;
        const x2 = px + NW / 2, y2 = py, my = (y1 + y2) / 2;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
        path.classList.add('tree-line');
        svg.appendChild(path);
      }
    }

    const gen = getGen(node.id);
    const div = document.createElement('div');
    div.className = `node gen-${Math.min(gen, 4)}`;
    div.style.left = px + 'px'; div.style.top = py + 'px';
    div.dataset.id = node.id;

    div.innerHTML = `
      <div class="node-card">
        <div class="node-header"></div>
        <div class="node-body">
          <div class="node-name">${node.name}</div>
           <div class="node-hint">اضغط لإضافة ابن</div> 
        </div>
      </div>
      <div class="add-child-btn" title="إضافة ابن">+</div>`;

    // click card → add child
    div.querySelector('.node-card').addEventListener('click', e => {
      e.stopPropagation();
      openAddChildModal(node.id);
    });
    // + button → add child
    div.querySelector('.add-child-btn').addEventListener('click', e => {
      e.stopPropagation();
      openAddChildModal(node.id);
    });
    // right-click → context menu
    div.addEventListener('contextmenu', e => {
      e.preventDefault();
      showCtxMenu(node.id, e.clientX, e.clientY);
    });

    wrap2.appendChild(div);
  });
}

/* ══════════ PAN & ZOOM ══════════ */
let scale = 1, tx = 60, ty = 60;
let dragging = false, startX, startY, startTX, startTY;

const wrapEl = document.getElementById('canvas-wrap');
const canvasEl = document.getElementById('tree-canvas');

function applyTransform() {
  canvasEl.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}
function zoom(d) { scale = Math.min(3, Math.max(0.2, scale + d)); applyTransform(); }
function resetView() { scale = 1; tx = 60; ty = 60; applyTransform(); }

wrapEl.addEventListener('mousedown', e => {
  if (e.target.closest('.node-card') || e.target.closest('.add-child-btn')) return;
  dragging = true; wrapEl.classList.add('dragging');
  startX = e.clientX; startY = e.clientY; startTX = tx; startTY = ty;
  hideCtxMenu();
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = startTX + (e.clientX - startX); ty = startTY + (e.clientY - startY); applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; wrapEl.classList.remove('dragging'); });
wrapEl.addEventListener('wheel', e => { e.preventDefault(); zoom(e.deltaY < 0 ? .1 : -.1); }, { passive: false });

wrapEl.addEventListener('touchstart', e => {
  if (e.target.closest('.node-card') || e.target.closest('.add-child-btn')) return;
  dragging = true;
  startX = e.touches[0].clientX; startY = e.touches[0].clientY; startTX = tx; startTY = ty;
});
wrapEl.addEventListener('touchmove', e => {
  if (!dragging) return;
  tx = startTX + (e.touches[0].clientX - startX); ty = startTY + (e.touches[0].clientY - startY); applyTransform();
});
wrapEl.addEventListener('touchend', () => { dragging = false; });

document.addEventListener('click', () => hideCtxMenu());

/* ══════════ CONTEXT MENU ══════════ */
function showCtxMenu(id, x, y) {
  ctxNodeId = id;
  const m = document.getElementById('ctx-menu');
  m.classList.add('open');
  m.style.left = Math.min(x, window.innerWidth - 180) + 'px';
  m.style.top = Math.min(y, window.innerHeight - 130) + 'px';
}
function hideCtxMenu() { document.getElementById('ctx-menu').classList.remove('open'); ctxNodeId = null; }

function ctxAddChild() { const id = ctxNodeId; hideCtxMenu(); openAddChildModal(id); }
function ctxEdit() { const id = ctxNodeId; hideCtxMenu(); openEditModal(id); }
function ctxDelete() {
  const id = ctxNodeId; hideCtxMenu();
  const node = nodes.find(n => n.id === id); if (!node) return;
  const cnt = countDesc(id);
  if (!confirm(cnt > 0 ? `هل تريد حذف "${node.name}" و ${cnt} فرد من فروعه؟` : `هل تريد حذف "${node.name}"؟`)) return;
  const rem = new Set([id]);
  let ch = true;
  while (ch) { ch = false; nodes.forEach(n => { if (!rem.has(n.id) && rem.has(n.parent)) { rem.add(n.id); ch = true; } }); }
  nodes = nodes.filter(n => !rem.has(n.id));
  render(); applyTransform();
}
function countDesc(id) { let c = 0; function w(nid) { nodes.filter(x => x.parent === nid).forEach(x => { c++; w(x.id); }); } w(id); return c; }

/* ══════════ MODAL ══════════ */
function openRootModal() {
  modalMode = 'root'; modalParentId = null; modalNodeId = null;
  document.getElementById('modal-title').textContent = 'إضافة جد / أصل جديد';
  document.getElementById('modal-sub').textContent = 'سيظهر في أعلى الشجرة';
  document.getElementById('f-name').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 80);
}
function openAddChildModal(pid) {
  modalMode = 'add-child'; modalParentId = pid; modalNodeId = null;
  const p = nodes.find(n => n.id === pid);
  document.getElementById('modal-title').textContent = 'إضافة ابن';
  document.getElementById('modal-sub').textContent = p ? `ابن لـ: ${p.name}` : '';
  document.getElementById('f-name').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 80);
}
function openEditModal(id) {
  modalMode = 'edit'; modalParentId = null; modalNodeId = id;
  const node = nodes.find(n => n.id === id);
  document.getElementById('modal-title').textContent = 'تعديل الاسم';
  document.getElementById('modal-sub').textContent = '';
  document.getElementById('f-name').value = node ? node.name : '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => { const el = document.getElementById('f-name'); el.focus(); el.select(); }, 80);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function printTree() {
  const s = { scale, tx, ty };
  scale = 1; tx = PAD; ty = PAD; applyTransform();
  setTimeout(() => { window.print(); scale = s.scale; tx = s.tx; ty = s.ty; applyTransform(); }, 300);
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === '+' || e.key === '=') zoom(.15);
  if (e.key === '-') zoom(-.15);
  if (e.key === '0') resetView();
  if (e.key === 'Escape') { closeModal(); hideCtxMenu(); }
}););
